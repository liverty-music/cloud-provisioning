name: Bump Prod Pin

# Automated prod kustomize pin-bump (OpenSpec change `automate-prod-pin-bump`,
# tracking issue liverty-music/specification#553).
#
# Replaces the manual "open a pin-bump PR in cloud-provisioning" gate. After a
# backend/frontend Release retags the dev-AR digest into prod AR, the release
# workflow emits a `repository_dispatch` (type `bump-prod-pin`) carrying
# `{ component, tag, sha }`. This workflow validates the payload, confirms the
# prod-AR image actually exists (provenance gate), rewrites the prod overlay's
# `newTag` + `app.kubernetes.io/version` label in lock-step, validates with
# `kustomize build`, then pushes straight to `main` as `github-actions[bot]`.
# ArgoCD's existing auto-sync rolls it out. No PR.
#
# See docs/runbooks/prod-image-tag-pinning.md for the operator-facing flow,
# the manual-recovery path, and the `git revert` rollback.

on:
  # Automated path: emitted by backend `deploy.yml` / frontend
  # `push-image.yaml` after a successful prod-AR retag. Runs unattended.
  repository_dispatch:
    types: [bump-prod-pin]
  # Manual recovery path for a dropped/lost dispatch. Admin-gated via the
  # `prod-pin` Environment (see the conditional `environment:` below) so it
  # cannot be used to force an unreviewed prod change.
  workflow_dispatch:
    inputs:
      component:
        description: 'Component to bump (backend, frontend, or frontend-admin)'
        required: true
        type: choice
        options:
          - backend
          - frontend
          - frontend-admin
      tag:
        description: 'Release tag to pin (vX.Y.Z)'
        required: true
        type: string
      sha:
        description: 'Source commit SHA (recorded in the inline newTag trailer)'
        required: true
        type: string
      allow_rollback:
        description: 'Allow pinning BELOW the current prod pin (intentional rollback). Default false — the no-downgrade guard fails closed.'
        required: false
        type: boolean
        default: false

# Serialize all bumps: a backend and a frontend release can land within
# seconds of each other. `cancel-in-progress: false` means a queued bump
# waits for the running one rather than being dropped; the fetch-rebase-retry
# loop around the push handles the (conflict-free, disjoint-file) interleave.
concurrency:
  group: bump-prod-pin
  cancel-in-progress: false

env:
  REGION: asia-northeast2
  PROD_PROJECT_ID: liverty-music-prod
  # Standing tracking issue for the bump-automation (every bump commit refs it
  # for provenance — the per-release "why" is the Release itself).
  TRACKING_ISSUE: liverty-music/specification#553

jobs:
  bump:
    runs-on: ubuntu-latest
    # Conditional environment (OpenSpec design D8): the required-reviewer rule
    # on the `prod-pin` Environment fires for EVERY job that references it
    # (Environment protection rules have no trigger-type filter). Binding it
    # unconditionally would also stall the automated `repository_dispatch`
    # path on admin approval. So bind it ONLY on the manual trigger:
    #   - workflow_dispatch -> `prod-pin` -> pauses for admin approval
    #   - repository_dispatch -> '' (empty) -> runs unattended
    environment: ${{ github.event_name == 'workflow_dispatch' && 'prod-pin' || '' }}
    permissions:
      # Push the bump commit to `main` with the built-in token (the
      # `github-actions[bot]` actor, which branch protection lets bypass).
      contents: write
      # Federate to the prod CI service account for the `crane manifest`
      # provenance check against prod AR.
      id-token: write
    steps:
      # ----------------------------------------------------------------------
      # 1.2 Parse + validate the payload (from either trigger).
      # ----------------------------------------------------------------------
      - name: Resolve and validate payload
        id: payload
        env:
          # repository_dispatch carries client_payload.*; workflow_dispatch
          # carries inputs.*. Coalesce to a single env var each.
          COMPONENT: ${{ github.event.client_payload.component || inputs.component }}
          TAG: ${{ github.event.client_payload.tag || inputs.tag }}
          SHA: ${{ github.event.client_payload.sha || inputs.sha }}
          # Only the manual trigger can request a rollback; the automated
          # repository_dispatch path carries no such field, so this coalesces to
          # 'false' there and the no-downgrade guard always fails closed.
          ALLOW_ROLLBACK: ${{ github.event.client_payload.allow_rollback || inputs.allow_rollback || 'false' }}
        run: |
          set -euo pipefail
          echo "Trigger: ${{ github.event_name }}; component=${COMPONENT} tag=${TAG} sha=${SHA}"

          case "${COMPONENT}" in
            backend|frontend|frontend-admin) ;;
            *)
              echo "::error::Invalid component '${COMPONENT}' — must be 'backend', 'frontend', or 'frontend-admin'."
              exit 1
              ;;
          esac

          if ! echo "${TAG}" | grep -qE '^v[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid tag '${TAG}' — must match ^v[0-9]+\.[0-9]+\.[0-9]+$ (e.g. v1.4.0)."
            exit 1
          fi

          if [ -z "${SHA}" ]; then
            echo "::error::Empty sha — the source commit SHA is required for the inline newTag trailer."
            exit 1
          fi

          # Bare semver (no leading `v`) for the app.kubernetes.io/version label.
          BARE="${TAG#v}"

          # Per-component routing. `frontend-admin` is the admin console image: it
          # SHARES the `frontend` kustomize overlay + prod-AR repo with the
          # consumer, but bumps ONLY its own `admin-app` image entry and does NOT
          # move the consumer's `app.kubernetes.io/version` label — so admin and
          # consumer pins advance independently within the one overlay. `frontend`
          # conversely edits only `web-app`, never the admin entry.
          case "${COMPONENT}" in
            backend)
              OVERLAY=backend; AR_REPO=backend
              IMAGES="server consumer concert-discovery artist-image-sync merch-discovery"
              BUMP_LABEL=true ;;
            frontend)
              OVERLAY=frontend; AR_REPO=frontend
              IMAGES="web-app"
              BUMP_LABEL=true ;;
            frontend-admin)
              OVERLAY=frontend; AR_REPO=frontend
              IMAGES="admin-app"
              BUMP_LABEL=false ;;
          esac

          {
            echo "component=${COMPONENT}"
            echo "tag=${TAG}"
            echo "sha=${SHA}"
            echo "bare=${BARE}"
            echo "overlay=${OVERLAY}"
            echo "ar_repo=${AR_REPO}"
            echo "images=${IMAGES}"
            echo "bump_label=${BUMP_LABEL}"
            echo "allow_rollback=${ALLOW_ROLLBACK}"
          } >> "$GITHUB_OUTPUT"

      # Mint a ci-bot installation token. The bump is pushed to `main` AS this
      # org-owned App, which is the sole bypass actor on the `main` ruleset
      # (the built-in github-actions[bot] cannot be a repo-ruleset bypass actor,
      # and org rulesets need a Team plan — see bump-prod-pin design). Repo-level
      # secrets (provisioned by Pulumi) so they resolve on the empty-environment
      # repository_dispatch path.
      - name: Mint ci-bot token
        id: bot
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.CI_BOT_APP_ID }}
          private-key: ${{ secrets.CI_BOT_APP_PRIVATE_KEY }}

      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so the fetch-rebase-retry push loop can rebase on a
          # concurrent bump. Persist the ci-bot token (not the built-in
          # GITHUB_TOKEN) as the origin credential so the loop's fetch + push
          # authenticate AS ci-bot — the sole `main` ruleset bypass actor — and
          # the push is accepted.
          fetch-depth: 0
          persist-credentials: true
          token: ${{ steps.bot.outputs.token }}

      # ----------------------------------------------------------------------
      # 1.2a Provenance gate — fail-closed BEFORE any edit. The prod-AR image
      # at `:<tag>` exists only if the release retag actually wrote it, so this
      # one check simultaneously confirms the tag names a genuine release, that
      # this component's retag completed, and rejects the silent-downgrade and
      # bogus-tag paths. Applies to both triggers.
      # ----------------------------------------------------------------------
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          # Repository-level SECRETS (not environment-scoped) so they resolve on
          # the empty-environment `repository_dispatch` path. Stored as secrets
          # rather than variables because the Pulumi GitHub token has
          # Secrets:write but not Variables:write on the repo (the repo-variables
          # API returns 403). The values (WIF provider, SA email) are not
          # sensitive — masking in logs is a harmless side effect. Provisioned by
          # Pulumi on the prod stack — see cloud-provisioning/src/github/.
          workload_identity_provider: ${{ secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for prod AR
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      # SHA-pinned: this action installs `crane`, which here runs with prod-AR
      # read credentials. SHA of v0.4 matches the backend/frontend release
      # workflows' pinning.
      - name: Install crane
        uses: imjasonh/setup-crane@31b88efe9de28ae0ffa220711af4b60be9435f6e # v0.4

      - name: Verify prod-AR image provenance
        id: provenance
        env:
          AR_REPO: ${{ steps.payload.outputs.ar_repo }}
          IMAGES: ${{ steps.payload.outputs.images }}
          TAG: ${{ steps.payload.outputs.tag }}
        run: |
          set -euo pipefail
          base="${REGION}-docker.pkg.dev/${PROD_PROJECT_ID}/${AR_REPO}"
          for img in ${IMAGES}; do
            ref="${base}/${img}:${TAG}"
            echo "Checking provenance: ${ref}"
            if ! crane manifest "${ref}" > /dev/null 2>crane_err.txt; then
              echo "::error::Provenance gate FAILED — prod-AR image not found: ${ref}. The release retag has not produced this tag (or it was removed). Refusing to pin a non-existent image. crane stderr: $(cat crane_err.txt)"
              exit 1
            fi
          done
          echo "All target images exist in prod AR at ${TAG}."

      # ----------------------------------------------------------------------
      # 1.2b No-downgrade guard — fail-closed when the incoming tag is a LOWER
      # semver than the current prod pin for this component. The provenance gate
      # (1.2a) proves the tag's image EXISTS but not that it is newer, so a
      # release cut from an ancestor commit — or a stale/duplicate dispatch that
      # lands after a newer release — could otherwise silently roll prod
      # BACKWARD (see the 2026-07-08 v1.23.1-over-v1.24.0 incident). Equal tags
      # pass here and are short-circuited by the idempotency guard (1.4).
      #
      # The checked-out overlay is authoritative: the `bump-prod-pin` concurrency
      # group serializes ALL bumps, so any prior bump's commit is already on the
      # main we just checked out — no post-rebase re-check is needed.
      #
      # An intentional rollback must set `allow_rollback=true` on the manual
      # workflow_dispatch; the automated repository_dispatch path never sets it.
      # ----------------------------------------------------------------------
      - name: No-downgrade guard
        env:
          OVERLAY: ${{ steps.payload.outputs.overlay }}
          IMAGES: ${{ steps.payload.outputs.images }}
          TAG: ${{ steps.payload.outputs.tag }}
          ALLOW_ROLLBACK: ${{ steps.payload.outputs.allow_rollback }}
        run: |
          set -euo pipefail
          file="k8s/namespaces/${OVERLAY}/overlays/prod/kustomization.yaml"

          # True when $1 is a strictly-lower semver than $2. Leading `v` is
          # stripped so `sort -V` compares the bare X.Y.Z; equal versions are
          # not "lower".
          is_lower() {
            a="${1#v}"; b="${2#v}"
            [ "${a}" != "${b}" ] && \
              [ "$(printf '%s\n%s\n' "${a}" "${b}" | sort -V | head -n1)" = "${a}" ]
          }

          for img in ${IMAGES}; do
            current="$(IMG="$img" yq '(.images[] | select(.name | test("/" + strenv(IMG) + "$"))).newTag' "$file")"
            # No existing pin to regress against — nothing to guard (first pin).
            if [ -z "${current}" ] || [ "${current}" = "null" ]; then
              echo "No current pin for ${img}; skipping downgrade check."
              continue
            fi
            if is_lower "${TAG}" "${current}"; then
              if [ "${ALLOW_ROLLBACK}" = "true" ]; then
                echo "::warning::${img}: pinning ${TAG} BELOW current ${current} — permitted by allow_rollback=true."
              else
                echo "::error::No-downgrade guard FAILED — ${img} is pinned to ${current} in prod but this bump targets the lower ${TAG}. Refusing to roll prod backward. If this rollback is intentional, re-run via workflow_dispatch with allow_rollback=true."
                exit 1
              fi
            else
              echo "${img}: ${TAG} >= current ${current} — OK."
            fi
          done

      # ----------------------------------------------------------------------
      # 1.4 Idempotency guard — if every target newTag already equals the
      # release tag, exit 0 without committing (handles dispatch redelivery /
      # manual re-run).
      # ----------------------------------------------------------------------
      - name: Idempotency check
        id: idem
        env:
          OVERLAY: ${{ steps.payload.outputs.overlay }}
          IMAGES: ${{ steps.payload.outputs.images }}
          TAG: ${{ steps.payload.outputs.tag }}
        run: |
          set -euo pipefail
          file="k8s/namespaces/${OVERLAY}/overlays/prod/kustomization.yaml"
          # Distinct newTag set across ONLY this component's image entries
          # (matched by the `/<image>` name suffix), so a frontend-admin bump is
          # idempotent against the admin-app entry alone, not the whole overlay.
          current="$(for img in ${IMAGES}; do IMG="$img" yq '(.images[] | select(.name | test("/" + strenv(IMG) + "$"))).newTag' "$file"; done | sort -u)"
          if [ "${current}" = "${TAG}" ]; then
            echo "All target newTag values already equal ${TAG}; nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      # ----------------------------------------------------------------------
      # 1.3 yq edit — rewrite every images[].newTag + its inline `# commit
      # <sha>` trailer and the app.kubernetes.io/version label, in lock-step.
      # ----------------------------------------------------------------------
      - name: Edit prod overlay
        if: steps.idem.outputs.skip != 'true'
        env:
          OVERLAY: ${{ steps.payload.outputs.overlay }}
          IMAGES: ${{ steps.payload.outputs.images }}
          TAG: ${{ steps.payload.outputs.tag }}
          SHA: ${{ steps.payload.outputs.sha }}
          BARE: ${{ steps.payload.outputs.bare }}
          BUMP_LABEL: ${{ steps.payload.outputs.bump_label }}
        run: |
          set -euo pipefail
          file="k8s/namespaces/${OVERLAY}/overlays/prod/kustomization.yaml"
          # Rewrite newTag + inline `# commit <sha>` trailer for ONLY this
          # component's image entries (matched by the `/<image>` name suffix), so
          # a frontend bump never touches admin-app and vice versa.
          for img in ${IMAGES}; do
            IMG="$img" TAG="${TAG}" yq -i '(.images[] | select(.name | test("/" + strenv(IMG) + "$"))).newTag = strenv(TAG)' "$file"
            IMG="$img" COMMENT="commit ${SHA}" yq -i '(.images[] | select(.name | test("/" + strenv(IMG) + "$"))).newTag line_comment = strenv(COMMENT)' "$file"
          done
          # Bump the app.kubernetes.io/version label only for the primary
          # component (consumer/backend). `frontend-admin` shares the overlay but
          # must not move the consumer's version label.
          if [ "${BUMP_LABEL}" = "true" ]; then
            BARE="${BARE}" yq -i '(.labels[].pairs."app.kubernetes.io/version") = strenv(BARE)' "$file"
          fi
          echo "----- edited ${file} -----"
          yq '{"images": .images, "labels": .labels}' "$file"

      # ----------------------------------------------------------------------
      # 1.5 Validation gate — `kustomize build` the edited overlay. A non-zero
      # build aborts before push, keeping `main` always-syncable. (No helmCharts
      # in the backend/frontend bases, so plain build suffices.)
      # ----------------------------------------------------------------------
      - name: Install Kustomize
        if: steps.idem.outputs.skip != 'true'
        uses: imranismail/setup-kustomize@v2

      - name: Validate overlay renders
        if: steps.idem.outputs.skip != 'true'
        env:
          OVERLAY: ${{ steps.payload.outputs.overlay }}
        run: |
          set -euo pipefail
          kustomize build "k8s/namespaces/${OVERLAY}/overlays/prod" > /dev/null
          echo "kustomize build of the ${OVERLAY} prod overlay succeeded."

      # ----------------------------------------------------------------------
      # 1.6 + 1.7 Commit as the ci-bot App and push to main with a
      # fetch-rebase-retry loop (≤5 attempts). No PR. The push authenticates as
      # ci-bot (the persisted token), the sole `main` ruleset bypass actor.
      # ----------------------------------------------------------------------
      - name: Commit and push to main
        if: steps.idem.outputs.skip != 'true'
        env:
          COMPONENT: ${{ steps.payload.outputs.component }}
          OVERLAY: ${{ steps.payload.outputs.overlay }}
          TAG: ${{ steps.payload.outputs.tag }}
          SHA: ${{ steps.payload.outputs.sha }}
          BARE: ${{ steps.payload.outputs.bare }}
          BUMP_LABEL: ${{ steps.payload.outputs.bump_label }}
          BOT_SLUG: ${{ steps.bot.outputs.app-slug }}
        run: |
          set -euo pipefail
          file="k8s/namespaces/${OVERLAY}/overlays/prod/kustomization.yaml"

          # Commit as the ci-bot App identity (the push is authenticated as this
          # App, the ruleset bypass actor).
          git config user.name "${BOT_SLUG}[bot]"
          git config user.email "${BOT_SLUG}[bot]@users.noreply.github.com"

          # Defensive: if no net diff (e.g. label/comment already matched),
          # skip the commit rather than create an empty one.
          if git diff --quiet -- "$file"; then
            echo "No net change after edit; skipping commit."
            exit 0
          fi

          git add "$file"
          # Build the commit message in a file to avoid heredoc indentation
          # leaking YAML/shell indent into the body.
          {
            printf 'feat(prod): pin %s prod overlay to %s\n\n' "${COMPONENT}" "${TAG}"
            printf 'Automated prod kustomize pin-bump: a %s Release (%s) retagged its\n' "${COMPONENT}" "${TAG}"
            printf 'dev-AR digest into prod AR, so this moves the prod overlay image pin\n'
            if [ "${BUMP_LABEL}" = "true" ]; then
              printf 'and app.kubernetes.io/version label to that release in lock-step.\n'
            else
              printf 'to that release. The app.kubernetes.io/version label tracks the\n'
              printf 'consumer (web-app) and is intentionally left unchanged.\n'
            fi
            printf 'ArgoCD auto-syncs the rollout. Replaces the former manual pin-bump PR\n'
            printf '(OpenSpec change automate-prod-pin-bump).\n\n'
            printf 'component: %s\n' "${COMPONENT}"
            printf 'tag: %s\n' "${TAG}"
            if [ "${BUMP_LABEL}" = "true" ]; then
              printf 'version label: %s\n' "${BARE}"
            fi
            printf 'source sha: %s\n\n' "${SHA}"
            printf 'Refs: %s\n' "${TRACKING_ISSUE}"
          } > /tmp/bump-commit-msg.txt
          git commit -F /tmp/bump-commit-msg.txt

          # Fetch-rebase-retry: a concurrent bump touches a DIFFERENT overlay
          # file, so the rebase is conflict-free; the retry simply re-applies
          # this commit on top of the other's. ≤5 attempts.
          for attempt in $(seq 1 5); do
            if git push origin HEAD:main; then
              echo "Pushed on attempt ${attempt}/5."
              exit 0
            fi
            echo "Push rejected on attempt ${attempt}/5; fetching + rebasing onto origin/main..."
            git fetch origin main
            git rebase origin/main
          done
          echo "::error::Failed to push the pin-bump to main after 5 rebase-retry attempts."
          exit 1
