apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: dev-apps
spec:
  namespace: argocd
  writeBackConfig:
    method: argocd
  applicationRefs:
  - namePattern: backend
    images:
    - alias: server
      imageName: asia-northeast2-docker.pkg.dev/liverty-music-dev/backend/server:main
      commonUpdateSettings:
        updateStrategy: digest
        pullSecret: ext:/scripts/auth.sh
    - alias: consumer
      imageName: asia-northeast2-docker.pkg.dev/liverty-music-dev/backend/consumer:main
      commonUpdateSettings:
        updateStrategy: digest
        forceUpdate: true
        pullSecret: ext:/scripts/auth.sh
    - alias: concert-discovery
      imageName: asia-northeast2-docker.pkg.dev/liverty-music-dev/backend/concert-discovery:main
      commonUpdateSettings:
        updateStrategy: digest
        forceUpdate: true
        pullSecret: ext:/scripts/auth.sh
  - namePattern: frontend
    images:
    - alias: web-app
      imageName: asia-northeast2-docker.pkg.dev/liverty-music-dev/frontend/web-app:main
      commonUpdateSettings:
        updateStrategy: digest
        pullSecret: ext:/scripts/auth.sh
    # Admin console image — a second, independently-reconciled artifact in the
    # same `frontend` ArgoCD Application. See OpenSpec change `add-admin-console`.
    - alias: admin-app
      imageName: asia-northeast2-docker.pkg.dev/liverty-music-dev/frontend/admin-app:main
      commonUpdateSettings:
        updateStrategy: digest
        pullSecret: ext:/scripts/auth.sh
