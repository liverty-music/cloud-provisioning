apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
- image-updater.yaml

patches:
# Global Spot VM patches for dev
- path: spot-vm_patch_deployment.yaml
  target:
    kind: Deployment
- path: spot-vm_patch_statefulset.yaml
  target:
    kind: StatefulSet
- path: spot-vm_patch_job.yaml
  target:
    kind: Job
# Override health-degraded notification trigger grace period (5 min for dev)
- path: notification-trigger_patch.yaml
  target:
    kind: ConfigMap
    name: argocd-notifications-cm

# Right-size CPU/memory requests for dev
- target:
    kind: StatefulSet
    name: argocd-application-controller
  patch: |-
    apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: argocd-application-controller
    spec:
      template:
        spec:
          containers:
          - name: application-controller
            resources:
              requests:
                cpu: 20m
                memory: 320Mi
              limits:
                cpu: 500m
                memory: 512Mi

- target:
    kind: Deployment
    name: argocd-server
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: argocd-server
    spec:
      template:
        spec:
          containers:
          - name: server
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 256Mi

- target:
    kind: Deployment
    name: argocd-repo-server
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: argocd-repo-server
    spec:
      template:
        spec:
          containers:
          - name: repo-server
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 500m
                memory: 256Mi

- target:
    kind: Deployment
    name: argocd-applicationset-controller
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: argocd-applicationset-controller
    spec:
      template:
        spec:
          containers:
          - name: applicationset-controller
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi

- target:
    kind: Deployment
    name: argocd-notifications-controller
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: argocd-notifications-controller
    spec:
      template:
        spec:
          containers:
          - name: notifications-controller
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi

- target:
    kind: Deployment
    name: argocd-redis
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: argocd-redis
    spec:
      template:
        spec:
          containers:
          - name: redis
            resources:
              requests:
                cpu: 10m
                memory: 52Mi
              limits:
                cpu: 200m
                memory: 128Mi

- target:
    kind: Deployment
    name: argocd-image-updater-controller
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: argocd-image-updater-controller
    spec:
      template:
        spec:
          containers:
          - name: argocd-image-updater-controller
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 128Mi

- target:
    kind: Job
    name: argocd-redis-secret-init
  patch: |-
    apiVersion: batch/v1
    kind: Job
    metadata:
      name: argocd-redis-secret-init
    spec:
      template:
        spec:
          containers:
          - name: secret-init
            resources:
              requests:
                cpu: 10m
                memory: 52Mi
              limits:
                cpu: 200m
                memory: 128Mi
