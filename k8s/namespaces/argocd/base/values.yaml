global:
  nodeSelector:
    cloud.google.com/compute-class: "autopilot-spot"

configs:
  cm:
    # Enable Helm template rendering inside kustomize overlays that use helmCharts:.
    # Required for external-secrets and reloader overlays.
    kustomize.buildOptions: "--enable-helm"
  params:
    # Use server-side diff for accurate sync status on GKE Autopilot.
    # Without this, ArgoCD uses legacy 3-way diff which reports false
    # OutOfSync for K8s server-side defaults (protocol, imagePullPolicy, etc.).
    controller.diff.server.side: "true"

server:
  service:
    type: ClusterIP
  extraArgs:
  - --insecure
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

controller:
  enableStatefulSet: true
  resources:
    requests:
      cpu: 50m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

redis:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 52Mi
    limits:
      cpu: 200m
      memory: 128Mi

redisSecretInit:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 52Mi
    limits:
      cpu: 200m
      memory: 128Mi

dex:
  enabled: false

notifications:
  enabled: true
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

  secret:
    # ESO creates argocd-notifications-secret via ExternalSecret
    create: false

  notifiers:
    service.googlechat: |
      webhooks:
        alertSpace: $google-chat-webhook-url

  templates:
    template.app-sync-failed: |
      message: |
        Application {{.app.metadata.name}} sync has failed.
        Error: {{ if .app.status.operationState }}{{.app.status.operationState.message}}{{ else }}unknown{{ end }}
        Details: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}?operation=true
    template.app-health-degraded: |
      message: |
        Application {{.app.metadata.name}} health has degraded.
        Health Status: {{.app.status.health.status}}
        {{range $c := .app.status.conditions}}
        - {{$c.type}}: {{$c.message}}
        {{end}}
        Details: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}
    template.app-sync-status-unknown: |
      message: |
        Application {{.app.metadata.name}} sync status is Unknown.
        {{range $c := .app.status.conditions}}
        - {{$c.type}}: {{$c.message}}
        {{end}}
        Details: {{.context.argocdUrl}}/applications/{{.app.metadata.name}}

  triggers:
    trigger.on-sync-failed: |
      - description: Application syncing has failed
        send:
        - app-sync-failed
        when: app.status.operationState != nil && app.status.operationState.phase in ['Error', 'Failed']
    trigger.on-health-degraded: |
      - description: Application has degraded
        send:
        - app-health-degraded
        when: app.status.health.status == 'Degraded'
    trigger.on-sync-status-unknown: |
      - description: Application status is Unknown
        send:
        - app-sync-status-unknown
        when: app.status.sync.status == 'Unknown'
    defaultTriggers: |
      - on-sync-failed
      - on-health-degraded
      - on-sync-status-unknown

  subscriptions:
  - recipients:
    - googlechat:alertSpace

applicationSet:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 256Mi
