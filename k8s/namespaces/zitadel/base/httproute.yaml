apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: zitadel-route
spec:
  parentRefs:
  - name: external-gateway
    namespace: gateway
  # `hostnames` is intentionally NOT set in base — each overlay (dev / prod)
  # supplies its environment-specific hostname via a patch. This is load-
  # bearing because the `/` catch-all rule below would intercept all Gateway
  # traffic without a hostname filter, breaking backend and frontend routing.
  rules:
  # Login UI path — route BEFORE the catch-all rule so the more specific
  # prefix match wins. Zitadel v4 Login V2 serves everything under
  # `/ui/v2/login/*` from the separate Web (Login UI) container on port 3000.
  - matches:
    - path:
        type: PathPrefix
        value: /ui/v2/login
    backendRefs:
    - name: zitadel-web
      port: 80
  # Everything else — OIDC (`/oauth/v2`, `/oidc/v1`), gRPC v2 APIs (`/v2`,
  # `/zitadel.*.v2.*`), legacy APIs (`/saml/v2`, `/assets/v1`), Admin Console
  # (`/ui/console`), and health probes (`/debug/*`) — reaches the API.
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: zitadel-api
      port: 80
