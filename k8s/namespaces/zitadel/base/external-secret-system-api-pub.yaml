# Pulls the System API user (`pulumi-system`) RSA **public** key from GCP
# Secret Manager into a Kubernetes Secret. The `zitadel-api` Pod mounts the
# key as a file at `/var/run/zitadel/system-api/pulumi-system.pem` and
# references that path from the `ZITADEL_SYSTEMAPIUSERS` env var
# (`{"pulumi-system":{"Path":"..."}}`).
#
# The corresponding **private** key never enters the cluster — it stays in
# the sibling GSM Secret `zitadel-system-api-key` and is read only by
# Pulumi at preview/up time to drive the `ZitadelInstanceCustomDomain`
# Dynamic Resource's JWT signing (see `src/zitadel/dynamic/instance-custom-domain.ts`).
#
# Provisioned by Pulumi `SecretsComponent` for the
# `route-login-v2-via-internal-zitadel-api` change. The System User exists
# so that calls to `instance.v2.AddCustomDomain` — which require
# `system.domain.write` (SYSTEM_OWNER) and cannot be made from an instance
# context — succeed declaratively without a Console bootstrap step.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: zitadel-system-api-pub
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: google-secret-manager
    kind: ClusterSecretStore
  target:
    name: zitadel-system-api-pub
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
  - secretKey: pulumi-system.pem
    remoteRef:
      key: zitadel-system-api-pub
