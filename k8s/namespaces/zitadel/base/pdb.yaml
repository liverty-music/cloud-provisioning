apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zitadel-api
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: zitadel
      component: api
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: zitadel-web
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: zitadel
      component: web
