# Pulls the Login V2 client's Personal Access Token from GCP Secret Manager
# (provisioned by Pulumi `LoginClientComponent` → KubernetesComponent
# `esoOnlySecrets`) and exposes it as a Kubernetes Secret in the zitadel
# namespace. The `zitadel-web` Pod mounts this Secret as a file referenced
# by `ZITADEL_SERVICE_USER_TOKEN_FILE`, per the upstream Login V2 contract:
#   https://zitadel.com/docs/self-hosting/manage/login-client
#
# `secretKey: token` is the in-cluster K8s Secret key. The file path
# `/var/run/zitadel/login-client.pat` (set on deployment-web.yaml) is what
# the env var ZITADEL_SERVICE_USER_TOKEN_FILE points at.
#
# Naming: K8s-side ExternalSecret and target Secret are named `zitadel-web-pat`
# to track the consumer Deployment (`zitadel-web`). The GSM source key
# (`zitadel-login-pat`) keeps its Pulumi-owned name — that name reflects the
# Zitadel-side "Login Client" concept and is independent of the K8s rename.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: zitadel-web-pat
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: google-secret-manager
    kind: ClusterSecretStore
  target:
    name: zitadel-web-pat
    creationPolicy: Owner
    deletionPolicy: Retain
  data:
  - secretKey: token
    remoteRef:
      key: zitadel-login-pat
