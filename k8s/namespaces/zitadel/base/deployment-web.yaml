apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel-web
  labels:
    app: zitadel
    component: web
spec:
  # Base posture: 2 replicas + podAntiAffinity (hostname topology) provides
  # HA against a single-node Spot preemption. `dev` overlay relaxes to 1.
  replicas: 2
  selector:
    matchLabels:
      app: zitadel
      component: web
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: zitadel
        component: web
    spec:
      serviceAccountName: zitadel
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: zitadel
                component: web
            topologyKey: kubernetes.io/hostname
      containers:
      # Login V2 UI container. Serves only `/ui/v2/login/*`; the HTTPRoute
      # splits traffic so non-login paths reach the API container instead.
      #
      # Image path: `zitadel-login`, not `login`. The Zitadel monorepo
      # publishes the Login V2 UI at `ghcr.io/zitadel/zitadel-login`, not
      # `ghcr.io/zitadel/login` (the latter 404s). The upstream Helm chart
      # default is the same path (see zitadel-charts@main values.yaml).
      #
      # Tag: pinned to the same semver as the API container so Login UI and
      # API ship from the same release cycle. The standalone `zitadel/typescript`
      # repo was archived 2026-04-18; Login V2 source now lives in the main
      # zitadel monorepo and the `zitadel-login` image now publishes the same
      # semver tags as `zitadel` (verified via `docker manifest inspect
      # ghcr.io/zitadel/zitadel-login:v4.14.0`). The earlier "semver-up-to-v4.7.3"
      # gap is closed.
      - name: web
        image: ghcr.io/zitadel/zitadel-login:v4.14.0
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        # ZITADEL_API_URL is the **cluster-internal Service URL** of the
        # Zitadel API. The prior public-issuer-URL design (where the Login
        # UI Pod hairpinned through the public Gateway IP back into the
        # same cluster) reliably hung Node's HTTP/1.1 Connect-RPC client
        # for 30s at the GCP HTTPS LB / Google Front End record layer in
        # prod, surfacing as `504 upstream request timeout` on every
        # `/ui/v2/login/login?authRequest=...` and blocking all sign-in /
        # sign-up. Direct `wget` from the same Pod to the same URL
        # responded in ~120ms — the failure was specific to Node's HTTP
        # client through the hairpin, the same class of fault Zitadel
        # upstream PR #12022 documented on Cloud Run as "intermittent SSL
        # routines::record layer failure errors that were tenant-consistent".
        #
        # The `Host` header for these calls is now
        # `zitadel-api.zitadel.svc.cluster.local`. Zitadel v4 selects the
        # virtual instance from the request's Host and matches it against
        # the configured InstanceDomains, so the cluster-internal
        # hostname is registered as an `InstanceCustomDomain` by the
        # `ZitadelInstanceCustomDomain` Pulumi Dynamic Resource (see
        # `src/zitadel/dynamic/instance-custom-domain.ts`). That
        # registration requires `system.domain.write` (SYSTEM_OWNER),
        # which is provided by the Pulumi-managed `pulumi-system` System
        # User declared via `ZITADEL_SYSTEMAPIUSERS` env on the
        # `zitadel-api` Pod.
        #
        # The URL has no explicit port; the `zitadel-api` Service
        # exposes `port: 80` → `targetPort: 8080`, so Node's HTTP client
        # emits `Host: zitadel-api.zitadel.svc.cluster.local` (no `:80`
        # — RFC 7230 §5.4 only includes the port when non-default), and
        # the registered domain matches exactly regardless of how
        # Zitadel handles port stripping.
        #
        # Plaintext HTTP is acceptable because traffic stays inside the
        # GKE cluster network; the existing `TLS Terminated at Gateway,
        # Cluster Traffic Unencrypted` requirement of the
        # `zitadel-self-hosted-deployment` spec already permits
        # unencrypted in-cluster hops.
        #
        # Refs:
        #   OpenSpec change `route-login-v2-via-internal-zitadel-api`
        #   Zitadel upstream PR #12022 (hairpin SSL fault context)
        - name: ZITADEL_API_URL
          value: http://zitadel-api.zitadel.svc.cluster.local
        - name: NEXT_PUBLIC_BASE_PATH
          value: /ui/v2/login
        # Personal Access Token used by the Login V2 UI Next.js server to
        # authenticate against the Zitadel API for SSR-side calls (instance
        # settings, cross-org user search, session management). Provisioned
        # by Pulumi `LoginClientComponent`, mirrored from GSM into a K8s
        # Secret by `external-secret-web-pat.yaml`, mounted as a file —
        # not as an env var — so it does not appear in `kubectl describe pod`
        # output.
        # Upstream contract:
        #   https://zitadel.com/docs/self-hosting/manage/login-client
        - name: ZITADEL_SERVICE_USER_TOKEN_FILE
          value: /var/run/zitadel/login-client.pat
        volumeMounts:
        - name: login-pat
          mountPath: /var/run/zitadel
          readOnly: true
        readinessProbe:
          httpGet:
            path: /ui/v2/login
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /ui/v2/login
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: login-pat
        secret:
          secretName: zitadel-web-pat
          # `secretKey: token` (set in external-secret-web-pat.yaml) lands
          # the PAT at /var/run/zitadel/token by default. Project it to
          # `login-client.pat` to match ZITADEL_SERVICE_USER_TOKEN_FILE.
          items:
          - key: token
            path: login-client.pat
