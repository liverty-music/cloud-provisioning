apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel-login
  labels:
    app: zitadel
    component: login
spec:
  selector:
    matchLabels:
      app: zitadel
      component: login
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: zitadel
        component: login
    spec:
      serviceAccountName: zitadel
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: zitadel
                component: login
            topologyKey: kubernetes.io/hostname
      containers:
      # Login V2 UI container. Serves only `/ui/v2/login/*`; the HTTPRoute
      # splits traffic so non-login paths reach the API container instead.
      # ZITADEL_API_URL points at the in-cluster API Service so the login UI
      # can call the API without egressing the cluster.
      #
      # Image path: `zitadel-login`, not `login`. The Zitadel monorepo
      # publishes the Login V2 UI at `ghcr.io/zitadel/zitadel-login`, not
      # `ghcr.io/zitadel/login` (the latter 404s). The upstream Helm chart
      # default is the same path (see zitadel-charts@main values.yaml).
      #
      # Tag: `latest`. The zitadel-login container publishes semver tags only
      # up to v4.7.3; v4.8+ ship as git-SHA tags only. The Helm chart's
      # appVersion (v4.13.0) expects `login:v4.13.0`, but that tag does not
      # exist. Using `latest` in dev accepts the risk of upstream drift in
      # exchange for avoiding a SHA-pinning runbook. `imagePullPolicy:
      # IfNotPresent` prevents every restart from re-pulling. For
      # staging/prod, pin a specific SHA after validating compatibility.
      - name: zitadel-login
        image: ghcr.io/zitadel/zitadel-login:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3000
          name: http
        env:
        # ZITADEL_API_URL must be the **public** issuer URL, not the
        # cluster-internal Service URL. Zitadel v4 selects the virtual
        # instance from the request's Host header and matches it against
        # the configured InstanceDomains; the cluster-internal hostname
        # `zitadel.zitadel.svc.cluster.local` is not in that list, so
        # internal calls return HTTP 404 ("Failed to fetch security
        # settings from API ... status:404").
        #
        # Setting the public URL here makes the login UI's outbound calls
        # carry `Host: auth.dev.liverty-music.app`. The request still stays
        # within the cluster: it goes Gateway → HTTPRoute (`/` catch-all
        # rule) → `zitadel` Service → API container. The Gateway round-trip
        # adds ~10ms but avoids any cluster-DNS rewrite hacks.
        #
        # An alternative (not used) is registering the internal hostname
        # as an InstanceDomain via the API; deferred because that adds an
        # imperative bootstrap step outside of Pulumi/Kustomize.
        #
        # Refs:
        #   https://zitadel.com/docs/self-hosting/manage/custom-domain
        - name: ZITADEL_API_URL
          value: https://auth.dev.liverty-music.app
        - name: NEXT_PUBLIC_BASE_PATH
          value: /ui/v2/login
        # Personal Access Token used by the Login V2 UI Next.js server to
        # authenticate against the Zitadel API for SSR-side calls (instance
        # settings, cross-org user search, session management). Provisioned
        # by Pulumi `LoginClientComponent`, mirrored from GSM into a K8s
        # Secret by `external-secret-login-pat.yaml`, mounted as a file —
        # not as an env var — so it does not appear in `kubectl describe pod`
        # output.
        # Upstream contract:
        #   https://zitadel.com/docs/self-hosting/manage/login-client
        - name: ZITADEL_SERVICE_USER_TOKEN_FILE
          value: /var/run/zitadel/login-client.pat
        volumeMounts:
        - name: login-pat
          mountPath: /var/run/zitadel
          readOnly: true
        readinessProbe:
          httpGet:
            path: /ui/v2/login
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /ui/v2/login
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: login-pat
        secret:
          secretName: zitadel-login-pat
          # `secretKey: token` (set in external-secret-login-pat.yaml) lands
          # the PAT at /var/run/zitadel/token by default. Project it to
          # `login-client.pat` to match ZITADEL_SERVICE_USER_TOKEN_FILE.
          items:
          - key: token
            path: login-client.pat
