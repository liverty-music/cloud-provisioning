apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel-login
  labels:
    app: zitadel
    component: login
spec:
  selector:
    matchLabels:
      app: zitadel
      component: login
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: zitadel
        component: login
    spec:
      serviceAccountName: zitadel
      terminationGracePeriodSeconds: 30
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: zitadel
                component: login
            topologyKey: kubernetes.io/hostname
      containers:
      # Login V2 UI container. Serves only `/ui/v2/login/*`; the HTTPRoute
      # splits traffic so non-login paths reach the API container instead.
      # ZITADEL_API_URL points at the in-cluster API Service so the login UI
      # can call the API without egressing the cluster.
      - name: zitadel-login
        image: ghcr.io/zitadel/login:v4.13.1
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: ZITADEL_API_URL
          value: http://zitadel.zitadel.svc.cluster.local
        - name: NEXT_PUBLIC_BASE_PATH
          value: /ui/v2/login
        readinessProbe:
          httpGet:
            path: /ui/v2/login
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /ui/v2/login
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
