apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel-api
  labels:
    app: zitadel
    component: api
  annotations:
    # Restart on configmap/secret changes so masterkey / env updates land
    # without a manual rollout.
    reloader.stakater.com/auto: "true"
spec:
  # Base posture: 2 replicas + podAntiAffinity (hostname topology) provides
  # HA against a single-node Spot preemption. `dev` overlay relaxes to 1.
  replicas: 2
  selector:
    matchLabels:
      app: zitadel
      component: api
  strategy:
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: zitadel
        component: api
    spec:
      serviceAccountName: zitadel
      terminationGracePeriodSeconds: 60
      # Disable K8s legacy service-discovery env vars. Defensive insurance.
      # Pre-rename history: the `zitadel` Service injected `ZITADEL_PORT=
      # tcp://<ip>:80` into every pod, which Viper parsed as the top-level
      # `Port` (uint16) config field — startup failed with `'Port' cannot
      # parse value as 'uint16': strconv.ParseUint: invalid syntax`. After
      # the rename to `zitadel-api`, the injected env var is `ZITADEL_API_
      # PORT`, which has no matching uint16 config field, so that specific
      # collision no longer applies. The flag stays because any future
      # Service in this namespace could trigger an analogous collision and
      # the flag is essentially free. DNS-based service discovery
      # (`zitadel-api.zitadel.svc.cluster.local`) works regardless.
      enableServiceLinks: false
      # Keep both replicas on different nodes so a single Spot preemption
      # cannot take the entire API plane down.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: zitadel
                component: api
            topologyKey: kubernetes.io/hostname
      volumes:
      - name: bootstrap
        emptyDir: {}
      # System API user RSA public key, projected as a file the Zitadel API
      # process reads via the `ZITADEL_SYSTEMAPIUSERS` env (`Path` field).
      # Provisioned by ESO from GSM Secret `zitadel-system-api-pub` (see
      # `external-secret-system-api-pub.yaml`). The private half stays in
      # GSM and is only read by Pulumi to sign JWTs in the
      # `ZitadelInstanceCustomDomain` Dynamic Resource — never enters the
      # cluster.
      - name: system-api-pub
        secret:
          secretName: zitadel-system-api-pub
          items:
          - key: pulumi-system.pem
            path: pulumi-system.pem
      containers:
      # Main Zitadel API container. `start-from-init` is idempotent — on an
      # empty database it runs init + setup; on an initialized database it
      # runs setup (pending migrations) + start. FIRSTINSTANCE env vars in
      # the configmap are consumed only on the first run.
      - name: api
        image: ghcr.io/zitadel/zitadel:v4.14.0
        args:
        - start-from-init
        - --masterkeyFromEnv
        - --tlsMode
        - external
        ports:
        - containerPort: 8080
          name: http
        env:
        # Declare the Pulumi-managed System User so Pulumi can call
        # `instance.v2.AddCustomDomain` with a SYSTEM_OWNER JWT. The user
        # name in this JSON key (`pulumi-system`) MUST match the `iss`/`sub`
        # claims emitted by `buildSystemAssertion` in
        # `src/zitadel/dynamic/api-client.ts`; if these drift the JWT
        # verifies against the wrong key and every Dynamic Resource call
        # fails with 401. The `Path` field points at the file projected by
        # the `system-api-pub` Secret volume below. `Memberships` is
        # omitted — Zitadel defaults to `MemberType: System, Role:
        # SYSTEM_OWNER` which is exactly what `system.domain.write`
        # requires.
        - name: ZITADEL_SYSTEMAPIUSERS
          value: '{"pulumi-system":{"Path":"/var/run/zitadel/system-api/pulumi-system.pem"}}'
        envFrom:
        - configMapRef:
            name: zitadel-config
        - secretRef:
            name: zitadel-secrets
        volumeMounts:
        - name: bootstrap
          mountPath: /var/zitadel/bootstrap
        - name: system-api-pub
          mountPath: /var/run/zitadel/system-api
          readOnly: true
        readinessProbe:
          httpGet:
            path: /debug/ready
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 6
        livenessProbe:
          httpGet:
            path: /debug/healthz
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      # Cloud SQL Auth Proxy sidecar — brokers IAM auth to Cloud SQL over PSC.
      # Mirrors the backend's sql-proxy pattern: --auto-iam-authn uses the
      # pod's Workload Identity SA (zitadel-sa@...) to sign DB tokens.
      - name: cloud-sql-proxy
        image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
        args:
        - --psc
        - --auto-iam-authn
        - --port=5432
        - --address=127.0.0.1
        - liverty-music-dev:asia-northeast2:postgres-osaka
        ports:
        - containerPort: 5432
          name: postgres
        securityContext:
          runAsNonRoot: true
          runAsUser: 65532
          allowPrivilegeEscalation: false
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            cpu: 100m
            memory: 64Mi
      # Bootstrap uploader — on first boot, Zitadel writes the admin machine
      # user's JSON key to the shared emptyDir via `FIRSTINSTANCE_MACHINEKEYPATH`.
      # This sidecar watches for the file, compares to the currently stored
      # GSM version, uploads a new version when different, then idles so the
      # pod stays healthy. Idempotent across pod restarts.
      - name: bootstrap-uploader
        image: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          KEY_FILE=/var/zitadel/bootstrap/admin-sa.json
          SECRET_NAME=zitadel-machine-key-for-pulumi-admin
          echo "bootstrap-uploader: waiting for $KEY_FILE"
          while [ ! -f "$KEY_FILE" ]; do sleep 2; done
          if existing=$(gcloud secrets versions access latest --secret="$SECRET_NAME" 2>/dev/null); then
            if [ "$existing" = "$(cat "$KEY_FILE")" ]; then
              echo "bootstrap-uploader: stored version already matches, skipping upload"
              exec tail -f /dev/null
            fi
          fi
          echo "bootstrap-uploader: uploading new admin-sa key"
          gcloud secrets versions add "$SECRET_NAME" --data-file="$KEY_FILE"
          echo "bootstrap-uploader: upload complete"
          exec tail -f /dev/null
        volumeMounts:
        - name: bootstrap
          mountPath: /var/zitadel/bootstrap
          readOnly: true
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            cpu: 100m
            memory: 128Mi
