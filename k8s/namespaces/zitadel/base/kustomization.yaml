apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zitadel

resources:
- namespace.yaml
- serviceaccount.yaml
- deployment-api.yaml
- deployment-login.yaml
- service-api.yaml
- service-login.yaml
- httproute.yaml
- pdb.yaml
- external-secret.yaml

configMapGenerator:
- name: zitadel-config
  envs:
  - configmap.env

labels:
- includeSelectors: false
  pairs:
    owner: zitadel
