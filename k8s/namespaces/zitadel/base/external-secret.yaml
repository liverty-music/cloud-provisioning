# Mirrors GSM `zitadel-masterkey` into a K8s Secret named
# `zitadel-masterkey` with the data key `masterkey` (chart convention).
# The chart reads this Secret via `zitadel.masterkeySecretName: zitadel-masterkey`
# in values.yaml and expects the data key to be literally `masterkey`.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: zitadel-masterkey
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: google-secret-manager
    kind: ClusterSecretStore
  target:
    name: zitadel-masterkey
    creationPolicy: Owner
  data:
  - secretKey: masterkey
    remoteRef:
      key: zitadel-masterkey
