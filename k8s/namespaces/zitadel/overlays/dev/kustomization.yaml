apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply `zitadel` namespace to overlay-added resources (the base's
# `namespace:` field only covers resources defined in the base; the
# CronJob + RBAC below are introduced here, so we set it explicitly).
namespace: zitadel

resources:
- ../../base
# Dev-only band-aid for `self-hosted-zitadel` §18.6 hang. NOT in base,
# so staging / prod overlays do not silently inherit the weekly
# restart. To be removed once the root cause is found — search the
# `liverty-music.app/temporary` annotation to locate.
- cronjob-restart-zitadel.yaml
# Dev-only DB grant Job. Hardcodes the dev Cloud SQL instance + dev IAM
# SA username; cannot live in base without a templating layer. Prod will
# need its own equivalent when prod prereqs (Cloud SQL prod instance,
# IAM user, postgres-admin-password GSM secret) are provisioned.
- job-grant-db.yaml

configMapGenerator:
- name: zitadel-config
  behavior: merge
  envs:
  - configmap-patch.env

patches:
# Dev-only replica count + spot-pool nodeSelector + reduced resource requests.
- path: deployment-patch.yaml
  target:
    kind: Deployment
    name: zitadel-api
- path: deployment-web-patch.yaml
  target:
    kind: Deployment
    name: zitadel-web
# Relax both PDBs to minAvailable=0 so the single dev replica can be
# voluntarily evicted (rollout, drain, Spot preemption).
- path: pdb-patch.yaml
# Supply the dev hostname for the Zitadel HTTPRoute (base omits `hostnames`
# so each overlay scopes its `/` catch-all rule to its own auth domain).
- path: httproute-patch.yaml
  target:
    kind: HTTPRoute
    name: zitadel-route
