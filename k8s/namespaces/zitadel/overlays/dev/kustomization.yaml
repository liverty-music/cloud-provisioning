apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zitadel

# Render the Zitadel Helm chart layering: base/values.yaml (shared) →
# overlays/dev/values.yaml (env diffs). The cross-directory reference
# requires `--load-restrictor=LoadRestrictionsNone` on both CI
# (`Makefile:lint-k8s`) and ArgoCD (`argocd-cm.kustomize.buildOptions`).
helmCharts:
- name: zitadel
  repo: https://charts.zitadel.com
  version: 9.34.1
  releaseName: zitadel
  namespace: zitadel
  includeCRDs: false
  valuesFile: ../../base/values.yaml
  additionalValuesFiles:
  - values.yaml

resources:
- ../../base
# Dev-only band-aid for `self-hosted-zitadel` §18.6 hang. NOT in base,
# so staging / prod overlays do not silently inherit the weekly
# restart. To be removed once the root cause is found — search the
# `liverty-music.app/temporary` annotation to locate.
- cronjob-restart-zitadel.yaml
# Dev-only DB grant Job. Hardcodes the dev Cloud SQL instance + dev IAM
# SA username; cannot live in base without a templating layer.
- job-grant-db.yaml

patches:
# Supply the dev hostname for the Zitadel HTTPRoute (base omits `hostnames`
# so each overlay scopes its `/` catch-all rule to its own auth domain).
- path: httproute-patch.yaml
  target:
    kind: HTTPRoute
    name: zitadel-route
# Re-inject Login UI probes after disabling chart's default tight
# timings. See login-probe-patch.yaml for rationale.
- path: login-probe-patch.yaml
  target:
    kind: Deployment
    name: zitadel-api-login
