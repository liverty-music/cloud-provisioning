# Dev-specific Helm values, layered on top of `../../base/values.yaml`.
# See `helmCharts.additionalValuesFiles` in this overlay's
# `kustomization.yaml`.
#
# Only env-specific values live here. Shared values (image tag,
# resources, probes, login.env, masterkeySecretName, etc.) come from
# the base values file.

zitadel:
  configmapConfig:
    ExternalDomain: auth.dev.liverty-music.app
    Database:
      Postgres:
        User:
          Username: zitadel@liverty-music-dev.iam
        Admin:
          Username: zitadel@liverty-music-dev.iam

  # K8s native sidecars via initContainers + restartPolicy: Always.
  # See base/values.yaml for the rationale (avoids init/setup Job hang).
  initContainers:
  - name: cloud-sql-proxy
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
    restartPolicy: Always
    args:
    - --psc
    - --auto-iam-authn
    - --port=5432
    - --address=127.0.0.1
    - liverty-music-dev:asia-northeast2:postgres-osaka
    ports:
    - containerPort: 5432
      name: postgres
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      allowPrivilegeEscalation: false
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
  # bootstrap-uploader sidecar (from the pre-chart era) was removed
  # because the chart's setup Job writes the FirstInstance admin SA
  # key into an EPHEMERAL setup Pod (`/machinekey/sa.json`) — not into
  # the main API Deployment — so an API-side sidecar can never see
  # the file. Catastrophic restore now uses the chart's native
  # `setupJob.machinekeyWriter` (enabled in base/values.yaml) to
  # package the key into a K8s Secret named `pulumi-admin`, then the
  # operator manually uploads it to GSM. See
  # `docs/runbooks/zitadel-helm-chart.md` "Catastrophic restore-from-
  # scratch path" for the full procedure.
