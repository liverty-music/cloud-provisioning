# Dev overlay for the Zitadel Web (Login V2 UI) Deployment — same posture
# as the API deployment: replicaCount 1 + spot-pool nodeSelector. The base
# PDB is relaxed to minAvailable=0 in pdb-patch.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel-web
spec:
  replicas: 1
  template:
    spec:
      nodeSelector:
        cloud.google.com/gke-spot: "true"
