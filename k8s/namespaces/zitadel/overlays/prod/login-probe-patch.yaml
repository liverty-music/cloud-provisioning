# See ../dev/login-probe-patch.yaml for the full rationale. Same
# timings + chart-default paths apply to prod (also Spot nodes,
# same resource envelope).
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zitadel-api-login
spec:
  template:
    spec:
      containers:
      - name: zitadel-login
        readinessProbe:
          httpGet:
            path: /ui/v2/login/ready
            port: http-server
            scheme: HTTP
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /ui/v2/login/healthy
            port: http-server
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3
