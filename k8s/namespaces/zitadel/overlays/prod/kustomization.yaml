apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zitadel

resources:
- ../../base
# NOTE: `cronjob-restart-zitadel.yaml` is intentionally NOT imported here.
# That resource is a dev-only band-aid for the `self-hosted-zitadel` §18.6
# hang (search the `liverty-music.app/temporary` annotation in the dev
# overlay). Prod must not silently inherit a weekly forced restart.

patches:
# Apply Spot-pool nodeSelector to both Deployments. Replica count and PDB
# minAvailable inherit from base (replicas: 2, minAvailable: 1) — the spot
# choice is acceptable pre-launch because base podAntiAffinity ensures
# different-host placement; revisit non-spot when SLO/traffic justifies.
- path: deployment-api-patch.yaml
  target:
    kind: Deployment
    name: zitadel-api
- path: deployment-web-patch.yaml
  target:
    kind: Deployment
    name: zitadel-web
# Supply the prod hostname for the Zitadel HTTPRoute (base omits `hostnames`
# so each overlay scopes its `/` catch-all rule to its own auth domain).
- path: httproute-patch.yaml
  target:
    kind: HTTPRoute
    name: zitadel-route
