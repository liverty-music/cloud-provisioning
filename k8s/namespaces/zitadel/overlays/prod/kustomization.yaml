apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: zitadel

# Render the Zitadel Helm chart layering base/values.yaml + overlay.
# See `../dev/kustomization.yaml` for the LoadRestrictionsNone rationale.
helmCharts:
- name: zitadel
  repo: https://charts.zitadel.com
  version: 9.34.1
  releaseName: zitadel
  namespace: zitadel
  includeCRDs: false
  valuesFile: ../../base/values.yaml
  additionalValuesFiles:
  - values.yaml

resources:
- ../../base
# Prod DB grant Job — idempotent ALTER DATABASE OWNER + GRANT scoped to the
# prod Cloud SQL `zitadel` DB.
- job-grant-db.yaml
# NOTE: PodMonitoring CRD (previously `podmonitoring.yaml`) was deleted as
# part of the Helm chart migration. Zitadel v4 has no `/debug/metrics`
# HTTP scrape endpoint — the path returns 404 on v4.14.0. Observability
# is now driven by the OpenTelemetry SDK autoexport via the OTEL_* env
# vars in `base/values.yaml` (top-level `env:`), which push metrics +
# traces to the in-cluster OTLP collector. The collector's `metrics`
# pipeline forwards to Cloud Monitoring; the prior GMP scrape path is
# entirely replaced by this push model.
#
# NOTE: `cronjob-restart-zitadel.yaml` is intentionally NOT imported here.

patches:
# Override the Workload Identity GCP SA on the `zitadel` ServiceAccount
# (base annotates the dev project's SA; prod pods need the prod SA).
- path: serviceaccount-patch.yaml
  target:
    kind: ServiceAccount
    name: zitadel
# Supply the prod hostname for the Zitadel HTTPRoute (base omits `hostnames`
# so each overlay scopes its `/` catch-all rule to its own auth domain).
- path: httproute-patch.yaml
  target:
    kind: HTTPRoute
    name: zitadel-route
# Re-inject Login UI probes with conservative timings + chart-default paths.
- path: login-probe-patch.yaml
  target:
    kind: Deployment
    name: zitadel-api-login
