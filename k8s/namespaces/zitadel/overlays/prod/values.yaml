# Prod-specific Helm values, layered on top of `../../base/values.yaml`.
# See `../dev/values.yaml` for the full structural commentary.

zitadel:
  configmapConfig:
    ExternalDomain: auth.liverty-music.app
    Database:
      Postgres:
        User:
          Username: zitadel@liverty-music-prod.iam
        Admin:
          Username: zitadel@liverty-music-prod.iam

  # K8s native sidecars (restartPolicy: Always on initContainers).
  # See ../dev/values.yaml + base/values.yaml for full rationale.
  initContainers:
  - name: cloud-sql-proxy
    image: gcr.io/cloud-sql-connectors/cloud-sql-proxy:2
    restartPolicy: Always
    args:
    - --psc
    - --auto-iam-authn
    - --port=5432
    - --address=127.0.0.1
    - liverty-music-prod:asia-northeast2:postgres-osaka
    ports:
    - containerPort: 5432
      name: postgres
    securityContext:
      runAsNonRoot: true
      runAsUser: 65532
      allowPrivilegeEscalation: false
    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        cpu: 100m
        memory: 64Mi
  # See ../dev/values.yaml for the bootstrap-uploader removal rationale.
