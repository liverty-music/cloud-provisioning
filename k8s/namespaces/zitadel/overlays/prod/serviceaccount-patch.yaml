# Prod overlay: override the Workload Identity binding to the prod GCP IAM SA.
# Base hardcodes `zitadel@liverty-music-dev.iam.gserviceaccount.com`; without
# this patch, prod pods would attempt cross-project IAM impersonation against
# the dev SA, and Cloud SQL IAM auth + Secret Manager writes would fail.
# Same env-leak-from-base pattern as the HTTPRoute hostname (design D1).
apiVersion: v1
kind: ServiceAccount
metadata:
  name: zitadel
  annotations:
    iam.gke.io/gcp-service-account: zitadel@liverty-music-prod.iam.gserviceaccount.com
