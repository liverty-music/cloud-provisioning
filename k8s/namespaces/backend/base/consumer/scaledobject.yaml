apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: consumer-app
spec:
  scaleTargetRef:
    name: consumer-app
  minReplicaCount: 0
  maxReplicaCount: 3
  cooldownPeriod: 300
  pollingInterval: 30
  triggers:
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "CONCERT"
      consumer: "CONCERT_discovered"
      lagThreshold: "10"
      activationLagThreshold: "0"
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "CONCERT"
      consumer: "CONCERT_created"
      lagThreshold: "10"
      activationLagThreshold: "0"
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "ARTIST"
      consumer: "ARTIST_created"
      lagThreshold: "1"
      activationLagThreshold: "0"
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "USER"
      consumer: "USER_created"
      lagThreshold: "1"
      activationLagThreshold: "0"
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "USER"
      consumer: "USER_preferred_language_updated"
      lagThreshold: "1"
      activationLagThreshold: "0"
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "ARTIST"
      consumer: "ARTIST_followed"
      lagThreshold: "1"
      activationLagThreshold: "0"
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "ARTIST"
      consumer: "ARTIST_unfollowed"
      lagThreshold: "1"
      activationLagThreshold: "0"
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "NOTIFICATION"
      consumer: "NOTIFICATION_subscribed"
      lagThreshold: "1"
      activationLagThreshold: "0"
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "ENTRY"
      consumer: "ENTRY_zk_proof_verified"
      lagThreshold: "1"
      activationLagThreshold: "0"
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "ENTRY"
      consumer: "ENTRY_zk_proof_rejected"
      lagThreshold: "1"
      activationLagThreshold: "0"
