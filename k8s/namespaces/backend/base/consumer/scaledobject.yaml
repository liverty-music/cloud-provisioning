apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: consumer-app
spec:
  scaleTargetRef:
    name: consumer-app
  minReplicaCount: 0
  maxReplicaCount: 3
  cooldownPeriod: 300
  pollingInterval: 30
  triggers:
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "CONCERT"
      consumer: "CONCERT_discovered"
      lagThreshold: "10"
      activationLagThreshold: "0"
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "CONCERT"
      consumer: "CONCERT_created"
      lagThreshold: "10"
      activationLagThreshold: "0"
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "ARTIST"
      consumer: "ARTIST_created"
      lagThreshold: "1"
      activationLagThreshold: "0"
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "USER"
      consumer: "USER_created"
      lagThreshold: "1"
      activationLagThreshold: "0"
  # SALES_PHASE.discovered → announcement consumer. Durable name is the subject
  # with dots replaced by underscores (subscriber DurableCalculator).
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "SALES_PHASE"
      consumer: "SALES_PHASE_discovered"
      lagThreshold: "1"
      activationLagThreshold: "0"
  # SALES_PHASE.reminder.due → reminder delivery consumer.
  - type: nats-jetstream
    metadata:
      natsServerMonitoringEndpoint: "nats.nats.svc.cluster.local:8222"
      account: "$G"
      stream: "SALES_PHASE"
      consumer: "SALES_PHASE_reminder_due"
      lagThreshold: "1"
      activationLagThreshold: "0"
