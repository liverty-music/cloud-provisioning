apiVersion: apps/v1
kind: Deployment
metadata:
  name: consumer-app
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  template:
    spec:
      terminationGracePeriodSeconds: 90
      serviceAccountName: backend-app
      volumes:
      - name: zitadel-machine-key
        secret:
          secretName: backend-secrets
          items:
          - key: zitadel-machine-key.json
            path: zitadel-machine-key.json
      containers:
      - name: consumer
        image: consumer
        imagePullPolicy: Always
        ports:
        - containerPort: 8081
          name: health
        envFrom:
        - configMapRef:
            name: consumer-consumer-config
        - secretRef:
            name: backend-secrets
        volumeMounts:
        - name: zitadel-machine-key
          mountPath: /secrets/zitadel
          readOnly: true
        lifecycle:
          preStop:
            exec:
              command: ["sleep", "5"]
        readinessProbe:
          httpGet:
            path: /readyz
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 3
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 20
          timeoutSeconds: 3
          failureThreshold: 3
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 256Mi
