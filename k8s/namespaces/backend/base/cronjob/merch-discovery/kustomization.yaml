apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- cronjob.yaml

labels:
- includeSelectors: true
  pairs:
    app: merch-discovery

images:
- name: merch-discovery
  newName: asia-northeast2-docker.pkg.dev/liverty-music-dev/backend/merch-discovery
  newTag: latest

configMapGenerator:
- name: merch-discovery-job-config
  envs:
  - configmap.env
