apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- cronjob.yaml

labels:
- includeSelectors: true
  pairs:
    app: sales-reminders

images:
- name: sales-reminders
  newName: asia-northeast2-docker.pkg.dev/liverty-music-dev/backend/sales-reminders
  newTag: latest

configMapGenerator:
- name: sales-reminders-job-config
  envs:
  - configmap.env
