apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- deployment.yaml
- service.yaml
- service-webhook.yaml
- health-check-policy.yaml
- backend-policy.yaml
- httproute.yaml
- external-secret.yaml

configurations:
- kustomizeconfig.yaml

labels:
- includeSelectors: true
  pairs:
    app: server

images:
- name: server
  newName: asia-northeast2-docker.pkg.dev/liverty-music-dev/backend/server
  newTag: latest

configMapGenerator:
- name: server-config
  envs:
  - configmap.env
- name: server-zkp-verification-key
  files:
  - zkp-verification-key.json
