apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: server-backend-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: google-secret-manager
    kind: ClusterSecretStore
  target:
    name: backend-secrets
    creationPolicy: Owner
  data:
  - secretKey: LASTFM_API_KEY
    remoteRef:
      key: lastfm-api-key
  - secretKey: BLOCKCHAIN_DEPLOYER_PRIVATE_KEY
    remoteRef:
      key: blockchain-deployer-private-key
  - secretKey: BLOCKCHAIN_RPC_URL
    remoteRef:
      key: blockchain-rpc-url
  - secretKey: BLOCKCHAIN_BUNDLER_API_KEY
    remoteRef:
      key: blockchain-bundler-api-key
  - secretKey: VAPID_PRIVATE_KEY
    remoteRef:
      key: vapid-private-key
  - secretKey: FANARTTV_API_KEY
    remoteRef:
      key: fanarttv-api-key
  # PostHog Cloud EU public project API key for the analytics-consumer
  # workload. Backend `analytics_consumer.go` operates in nil-client
  # (log-and-ack) mode when the resulting env var is empty.
  - secretKey: POSTHOG_PROJECT_API_KEY
    remoteRef:
      key: posthog-public-project-key
  # REQUIRED post-backend-#303; `gemini.NewConcertSearcher` fails fast when empty.
  - secretKey: GCP_GEMINI_SEARCH_API_KEY
    remoteRef:
      key: gemini-search-api-key
  - secretKey: zitadel-machine-key-for-backend-app.json
    remoteRef:
      key: zitadel-machine-key-for-backend-app
