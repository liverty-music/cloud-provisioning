apiVersion: networking.gke.io/v1
kind: HealthCheckPolicy
metadata:
  name: server-admin-policy
spec:
  default:
    config:
      type: GRPC
      grpcHealthCheck:
        port: 8090
  targetRef:
    group: ""
    kind: Service
    name: server-admin-svc # Referenced via kustomizeconfig.yaml 'nameReference'
