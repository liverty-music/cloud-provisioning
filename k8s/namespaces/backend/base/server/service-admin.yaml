apiVersion: v1
kind: Service
metadata:
  name: server-admin-svc
spec:
  type: ClusterIP
  # Targets the same Pods as server-svc (commonLabels apply `app: server`),
  # but routes to the admin Connect server's dedicated port.
  ports:
  - port: 80
    targetPort: 8090
    protocol: TCP
    name: http-admin
    appProtocol: kubernetes.io/h2c # HTTP/2 Cleartext
