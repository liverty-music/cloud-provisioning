apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# Prod backend overlay. Env-divergent fields per design D2 / spec Requirement 3:
#   - GSA: backend-app@liverty-music-prod (vs liverty-music-dev)
#   - Cloud SQL: liverty-music-prod:asia-northeast2:postgres-osaka
#     (sql-proxy/deployment.yaml + ConfigMap DATABASE_HOST / DATABASE_INSTANCE_CONNECTION_NAME)
#   - PSC DNS: 298474959c18.25pf3r4b6sfkn.asia-northeast2.sql.goog
#   - DATABASE_USER: backend-app@liverty-music-prod.iam
#   - CORS_ALLOWED_ORIGINS: https://liverty-music.app (apex)
#   - OIDC_ISSUER_URL: https://auth.liverty-music.app
#   - HTTPRoute hostname: api.liverty-music.app
#   - GCP_PROJECT_ID, ENVIRONMENT=production
#
# Replicas: 1 (per design D8). Resource sizing matches dev exactly.
#
# IMPORTANT placeholders (replace before launch):
#   - TICKET_SBT_ADDRESS (mainnet contract address)
# Resolved 2026-05-15:
#   - VAPID_PUBLIC_KEY → prod-specific value derived from the GSM
#     `vapid-private-key` private scalar (see server/configmap.env note).
# The concert-discovery CronJob runs on the base daily schedule (no
# Fridays-only patch), because prod's concert ingestion should be regular.
resources:
  - ../../base
  - sql-proxy/deployment.yaml
  - podmonitoring.yaml
namespace: backend
# Apply the Kubernetes Recommended Label `app.kubernetes.io/version` to every
# rendered resource (Deployment, CronJob, Service, etc.). Value SHALL be the
# bare semver without the leading `v` (per Kubernetes Recommended Labels
# convention: `1.0.0`, not `v1.0.0`). Bump this in lock-step with the `images:`
# block `newTag:` below — they SHALL refer to the same release.
#
# - `includeSelectors: false` keeps the label out of `selector.matchLabels`
#   and Service selectors; modifying selectors mid-rollout would orphan running
#   Pods. The label is metadata-only.
# - `includeTemplates: true` propagates the label to `spec.template.metadata.labels`
#   on Deployments / CronJobs so Pods carry it for Prometheus / OTel scraping.
labels:
  - pairs:
      app.kubernetes.io/version: "1.12.0"
    includeSelectors: false
    includeTemplates: true
patches:
  - path: serviceaccount_patch.yaml
    target:
      kind: ServiceAccount
      name: backend-app
  # Global Spot VM patch for all Deployments
  - path: spot-vm_patch.yaml
    target:
      kind: Deployment
  - path: spot-vm_patch_cronjob.yaml
    target:
      kind: CronJob
  # Replicas: 1 (per design D8 — single replica during bootstrap)
  - target:
      kind: Deployment
      name: server-app
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: server-app
      spec:
        replicas: 1
  # Match dev's resource sizing exactly (design D2)
  - target:
      kind: Deployment
      name: server-app
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: server-app
      spec:
        template:
          spec:
            containers:
            - name: server
              resources:
                requests:
                  cpu: 10m
                  memory: 60Mi
                limits:
                  cpu: 200m
                  memory: 256Mi
  # Prod HTTPRoute hostname.
  - target:
      kind: HTTPRoute
      name: server-route
    patch: |-
      - op: add
        path: /spec/hostnames
        value: ["api.liverty-music.app"]
  # Prod admin API HTTPRoute hostname.
  - target:
      kind: HTTPRoute
      name: server-admin-route
    patch: |-
      - op: add
        path: /spec/hostnames
        value: ["api.admin.liverty-music.app"]
  # Match dev's consumer resource sizing.
  - target:
      kind: Deployment
      name: consumer-app
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: consumer-app
      spec:
        template:
          spec:
            containers:
            - name: consumer
              resources:
                requests:
                  cpu: 10m
                  memory: 20Mi
                limits:
                  cpu: 200m
                  memory: 128Mi
  # Consumer ScaledObject — pin to exactly 1 replica (min=max=1).
  #
  # minReplicaCount MUST be 1 (not 0): the Watermill JetStream push
  # consumers (durables) are deleted when the consumer Deployment scales to
  # zero and no subscriber holds the queue-group interest. A deleted durable
  # has no metric for KEDA's nats-jetstream scaler to read, so KEDA can never
  # scale the consumer back up from 0 — events published while idle (e.g. the
  # daily sales-phase discovery cron) pile up undelivered forever. Keeping one
  # replica always running holds the durables open so every event is consumed.
  # Long-lived streams created during earlier always-on periods (CONCERT,
  # ARTIST, USER) survived by chance; SALES_PHASE, added later, exposed the
  # deadlock. KEDA still scales up to maxReplicas under load.
  - target:
      kind: ScaledObject
      name: consumer-app
    patch: |-
      apiVersion: keda.sh/v1alpha1
      kind: ScaledObject
      metadata:
        name: consumer-app
      spec:
        minReplicaCount: 1
        maxReplicaCount: 1
configMapGenerator:
  - name: server-config
    behavior: merge
    envs:
      - server/configmap.env
  - name: concert-discovery-job-config
    behavior: merge
    envs:
      - cronjob/concert-discovery/configmap.env
  - name: artist-image-sync-job-config
    behavior: merge
    envs:
      - cronjob/artist-image-sync/configmap.env
  - name: merch-discovery-job-config
    behavior: merge
    envs:
      - cronjob/merch-discovery/configmap.env
  - name: sales-phase-discovery-job-config
    behavior: merge
    envs:
      - cronjob/sales-phase-discovery/configmap.env
  - name: sales-reminders-job-config
    behavior: merge
    envs:
      - cronjob/sales-reminders/configmap.env
  - name: consumer-consumer-config
    behavior: merge
    envs:
      - consumer/configmap.env
# Pin all backend images to the prod Artifact Registry with an
# immutable semantic-version tag. Per OpenSpec `enable-prod-ar-immutable-tags`
# + the `prod-image-tag-immutability` spec, prod uses semver tags (e.g.,
# v1.0.0) backed by AR's `dockerConfig.immutableTags: true` policy, which
# rejects tag-overwrite attempts at the registry API. Combined, this gives
# at-a-glance version visibility AND digest-equivalent immutability. The
# inline comment after each `newTag:` records the source commit SHA so
# incident-response trace from manifest → exact commit does not require
# an Artifact Registry round-trip.
#
# Policy: see docs/runbooks/prod-image-tag-pinning.md
#
# Note on the `name:` field: each backend sub-base (`base/server/`,
# `base/consumer/`, `base/cronjob/*/`) already has its own `images:`
# transformer that rewrites the bare container `image: server` →
# `asia-northeast2-docker.pkg.dev/liverty-music-dev/backend/server:latest`
# (env-specific config in base is pre-existing tech debt; out of scope
# here). By the time this overlay's `images:` block runs, the rendered
# image is already the dev-AR form, so we match against THAT name.
# Kustomize's last-write-wins semantics then rewrites to the prod AR FQDN
# + semver tag.
#
# Dev overlay omits an `images:` block: ArgoCD Image Updater resolves the
# dev-AR `:latest` reference dynamically. Prod uses explicit semver
# pinning; dev AR repos stay mutable so Image Updater can rewrite tags.
#
# Bumping on release: this block is now CI-written, not hand-edited.
# Cutting a GH Release (e.g., v1.0.1) on backend retags the dev-AR digest
# into prod AR, then emits a `repository_dispatch` to this repo's
# `.github/workflows/bump-prod-pin.yml`, which rewrites every `newTag:`
# + their inline `# commit <sha>` trailers AND the `app.kubernetes.io/version`
# label above (in lock-step) and pushes straight to main. ArgoCD auto-syncs.
# No manual pin-bump PR. See docs/runbooks/prod-image-tag-pinning.md
# (OpenSpec change automate-prod-pin-bump).
images:
  - name: asia-northeast2-docker.pkg.dev/liverty-music-dev/backend/server
    newName: asia-northeast2-docker.pkg.dev/liverty-music-prod/backend/server
    newTag: v1.12.0 # commit dd888e8ff0acc379e30efb80fdf3b0fcb060e26d
  - name: asia-northeast2-docker.pkg.dev/liverty-music-dev/backend/consumer
    newName: asia-northeast2-docker.pkg.dev/liverty-music-prod/backend/consumer
    newTag: v1.12.0 # commit dd888e8ff0acc379e30efb80fdf3b0fcb060e26d
  - name: asia-northeast2-docker.pkg.dev/liverty-music-dev/backend/concert-discovery
    newName: asia-northeast2-docker.pkg.dev/liverty-music-prod/backend/concert-discovery
    newTag: v1.12.0 # commit dd888e8ff0acc379e30efb80fdf3b0fcb060e26d
  - name: asia-northeast2-docker.pkg.dev/liverty-music-dev/backend/artist-image-sync
    newName: asia-northeast2-docker.pkg.dev/liverty-music-prod/backend/artist-image-sync
    newTag: v1.12.0 # commit dd888e8ff0acc379e30efb80fdf3b0fcb060e26d
  - name: asia-northeast2-docker.pkg.dev/liverty-music-dev/backend/merch-discovery
    newName: asia-northeast2-docker.pkg.dev/liverty-music-prod/backend/merch-discovery
    newTag: v1.12.0 # commit dd888e8ff0acc379e30efb80fdf3b0fcb060e26d
  - name: asia-northeast2-docker.pkg.dev/liverty-music-dev/backend/sales-phase-discovery
    newName: asia-northeast2-docker.pkg.dev/liverty-music-prod/backend/sales-phase-discovery
    newTag: v1.12.0 # commit dd888e8ff0acc379e30efb80fdf3b0fcb060e26d
  - name: asia-northeast2-docker.pkg.dev/liverty-music-dev/backend/sales-reminders
    newName: asia-northeast2-docker.pkg.dev/liverty-music-prod/backend/sales-reminders
    newTag: v1.12.0 # commit dd888e8ff0acc379e30efb80fdf3b0fcb060e26d
