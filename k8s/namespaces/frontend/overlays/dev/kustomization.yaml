apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base
# Admin console workload (dev only for now — prod opts in at the prod-rollout
# step once the admin image has a prod release). The global Spot VM + dev
# right-size patches below target `kind: Deployment`, so they apply to the
# admin Deployment automatically (the patch-body name is ignored when a target
# selector is set, as the spot-vm_patch already relies on).
- ../../base/admin
- configmap.yaml
- admin-configmap.yaml

namespace: frontend

patches:
# Global Spot VM patch for all Deployments in dev
- path: spot-vm_patch.yaml
  target:
    kind: Deployment

# Right-size resources for dev
- target:
    kind: Deployment
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: web-app
    spec:
      template:
        spec:
          containers:
          - name: caddy
            resources:
              requests:
                cpu: 10m
                memory: 52Mi
              limits:
                cpu: 100m
                memory: 128Mi

# Patch HTTPRoute hostname for dev environment
- target:
    kind: HTTPRoute
    name: web-route
  patch: |-
    - op: add
      path: /spec/hostnames
      value: ["dev.liverty-music.app"]

# Patch admin HTTPRoute hostname for dev environment
- target:
    kind: HTTPRoute
    name: admin-route
  patch: |-
    - op: add
      path: /spec/hostnames
      value: ["admin.dev.liverty-music.app"]
