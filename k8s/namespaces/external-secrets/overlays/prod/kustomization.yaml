apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod ESO overlay. Env-divergent fields per design D2 / spec Requirement 3:
#   - eso-sa-patch.yaml swaps the GSA email to the prod project's
#     k8s-external-secrets SA (Workload Identity binding).
# Resource sizing / replica counts match dev exactly.

resources:
- ../../base

patches:
- path: eso-sa-patch.yaml
  target:
    kind: ServiceAccount
    name: external-secrets

# Spot VM patch for prod: apply to all ESO Deployments
- target:
    kind: Deployment
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: external-secrets
    spec:
      template:
        spec:
          nodeSelector:
            cloud.google.com/gke-spot: "true"

# Replicas=1 per design D8 (matches dev)
- target:
    kind: Deployment
    name: external-secrets
    namespace: external-secrets
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 1

# Right-sized CPU requests (match dev — design D2)
- target:
    kind: Deployment
    name: external-secrets
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: external-secrets
    spec:
      template:
        spec:
          containers:
          - name: external-secrets
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi

- target:
    kind: Deployment
    name: external-secrets-cert-controller
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: external-secrets-cert-controller
    spec:
      template:
        spec:
          containers:
          - name: cert-controller
            resources:
              requests:
                cpu: 10m
                memory: 52Mi
              limits:
                cpu: 100m
                memory: 128Mi

- target:
    kind: Deployment
    name: external-secrets-webhook
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: external-secrets-webhook
    spec:
      template:
        spec:
          containers:
          - name: webhook
            resources:
              requests:
                cpu: 10m
                memory: 52Mi
              limits:
                cpu: 100m
                memory: 128Mi
