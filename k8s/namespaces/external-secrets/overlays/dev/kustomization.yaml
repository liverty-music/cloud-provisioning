apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
- ../../base

patches:
- path: eso-sa-patch.yaml
  target:
    kind: ServiceAccount
    name: external-secrets

# Spot VM patch for dev: apply to all ESO Deployments (controller, cert-controller, webhook)
# target selects all Deployments; metadata.name in the SMP body is not used for matching
- target:
    kind: Deployment
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: external-secrets
    spec:
      template:
        spec:
          nodeSelector:
            cloud.google.com/gke-spot: "true"

# Cost reduction: 1 replica is sufficient for dev
- target:
    kind: Deployment
    name: external-secrets
    namespace: external-secrets
  patch: |-
    - op: replace
      path: /spec/replicas
      value: 1

# Right-size CPU requests for dev
- target:
    kind: Deployment
    name: external-secrets
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: external-secrets
    spec:
      template:
        spec:
          containers:
          - name: external-secrets
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 200m
                memory: 256Mi

- target:
    kind: Deployment
    name: external-secrets-cert-controller
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: external-secrets-cert-controller
    spec:
      template:
        spec:
          containers:
          - name: cert-controller
            resources:
              requests:
                cpu: 10m
                memory: 52Mi
              limits:
                cpu: 100m
                memory: 128Mi

- target:
    kind: Deployment
    name: external-secrets-webhook
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: external-secrets-webhook
    spec:
      template:
        spec:
          containers:
          - name: webhook
            resources:
              requests:
                cpu: 10m
                memory: 52Mi
              limits:
                cpu: 100m
                memory: 128Mi
