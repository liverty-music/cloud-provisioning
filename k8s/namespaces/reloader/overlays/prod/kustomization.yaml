apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod Reloader overlay. Reloader is a singleton controller with no
# env-divergent state. Spot label + resource sizing match dev exactly.

resources:
- ../../base

patches:
- target:
    kind: Deployment
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: reloader
    spec:
      template:
        spec:
          nodeSelector:
            cloud.google.com/gke-spot: "true"

- target:
    kind: Deployment
    name: reloader-reloader
  patch: |-
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: reloader-reloader
    spec:
      template:
        spec:
          containers:
          - name: reloader-reloader
            resources:
              requests:
                cpu: 10m
                memory: 64Mi
              limits:
                cpu: 100m
                memory: 128Mi
