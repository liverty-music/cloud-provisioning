apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Prod NATS overlay. Single-replica StatefulSet (per design D8) — matches
# dev's pattern. Cluster-mode + multi-replica is a follow-up change when
# traffic justifies it; for greenfield prod, 1 replica minimizes idle nodes.

namespace: nats

# GMP PodMonitoring scraping the prometheus-nats-exporter sidecar, feeding the
# JetStream consumer-backlog stall alert (see src/gcp/components/monitoring.ts).
resources:
- podmonitoring.yaml

helmCharts:
- name: nats
  repo: https://nats-io.github.io/k8s/helm/charts/
  version: 1.3.16
  releaseName: nats
  namespace: nats
  valuesFile: values.yaml

patches:
- target:
    kind: StatefulSet
  patch: |-
    apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: nats
    spec:
      template:
        spec:
          nodeSelector:
            cloud.google.com/gke-spot: "true"
          # GKE Autopilot injects seccompProfile on all pods
          securityContext:
            seccompProfile:
              type: RuntimeDefault
