apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nats
  namespace: argocd
  # Wave 0: install NATS before consumer apps that depend on it
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
  - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/liverty-music/cloud-provisioning.git
    targetRevision: main
    path: k8s/namespaces/nats/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: nats
  ignoreDifferences:
  # GKE Autopilot injects ephemeral-storage, securityContext, and other defaults
  - group: apps
    kind: StatefulSet
    jqPathExpressions:
    - .spec.template.spec.containers[].resources
    - .spec.template.spec.containers[].securityContext
    - .spec.template.spec.securityContext
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
    - ServerSideApply=true
    - RespectIgnoreDifferences=true
