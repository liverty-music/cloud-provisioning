# ClusterPodMonitoring — GMP cost control for the prod Autopilot cluster.
#
# Why this exists:
# On GKE Autopilot ≥1.25, Google Managed Service for Prometheus (GMP) cannot
# be disabled at the cluster level per
# https://docs.cloud.google.com/stackdriver/docs/managed-prometheus/setup-managed:
#   "You can't turn off managed collection in GKE Autopilot clusters running
#    GKE version 1.25 or greater."
#
# Unfiltered GMP empirically costs "a few thousand yen / month" on a stock
# Autopilot cluster (observed on the prior dev Autopilot deployment). This
# resource bounds the cost into the $5-15/month band by:
#   1. Restricting ingested metrics to a small allow-list via metric_relabeling
#      keep rules (drop everything not matched).
#   2. Extending the scrape interval to 60s (default 15s ⇒ 4× ingestion
#      reduction).
#
# How to expand the allow-list later:
# When a metric-based alert is added that depends on a new metric family,
# extend the regex below (e.g., add `|http_requests_.+|grpc_server_.+`). Keep
# the regex narrow — each broadened family multiplies the ingestion volume.
#
# Reference: spec.md requirement
# "Prod cluster SHALL constrain Google Managed Service for Prometheus (GMP)
#  cost via metric filtering and extended scrape interval"
# in the migrate-prod-to-autopilot OpenSpec change.
apiVersion: monitoring.googleapis.com/v1
kind: ClusterPodMonitoring
metadata:
  name: gmp-cost-control
spec:
  # Empty selector matches all Pods cluster-wide. Combined with the
  # metric_relabeling keep rule below, this enforces the allow-list across
  # every Pod that exposes a /metrics endpoint.
  selector: {}
  endpoints:
    - port: metrics
      # 60s scrape interval — 4× reduction vs default 15s.
      interval: 60s
      metricRelabeling:
        # Drop every metric whose name does not match the allow-list. The
        # `keep` action with a regex that lists every wanted family is the
        # standard Prometheus pattern for cost-bounded ingestion.
        - sourceLabels: [__name__]
          regex: 'kube_(node|deployment|pod|namespace|statefulset|daemonset)_.+|container_(cpu|memory)_.+'
          action: keep
